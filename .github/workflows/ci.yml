name: CI

on:
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm test
      - run: pnpm run build

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run build
        env:
          NEXT_PUBLIC_USER_POOL_ID: placeholder
          NEXT_PUBLIC_USER_POOL_CLIENT_ID: placeholder

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - name: Build lambda artifact (needed for archive_file)
        run: cd backend && pnpm install --frozen-lockfile && pnpm run build
      - uses: hashicorp/setup-terraform@v4
      - name: Format check
        run: terraform fmt -check -recursive infra
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_PLAN_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - name: Init
        working-directory: infra/envs/prod
        run: terraform init -backend-config="bucket=${{ vars.STATE_BUCKET_NAME }}" -backend-config="region=${{ vars.AWS_REGION || 'us-east-1' }}"
      - name: Validate
        working-directory: infra/envs/prod
        run: terraform validate
      - name: Plan
        working-directory: infra/envs/prod
        run: terraform plan -var="region=${{ vars.AWS_REGION || 'us-east-1' }}" -var="site_bucket_name=${{ vars.SITE_BUCKET_NAME }}"
